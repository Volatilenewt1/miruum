<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Layout Designer</title>
  </head>
  <body>
    <!-- Netlify Forms: static declarations so the build bot detects them -->
    <form name="feedback" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field">
      <input name="type">
      <input name="subject">
      <textarea name="description"></textarea>
      <input name="screenshot" type="file">
    </form>
    <form name="quote" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field">
      <input name="name">
      <input name="email">
      <textarea name="description"></textarea>
      <input name="services">
      <input name="total">
      <input name="photo_angle_1" type="file">
      <input name="photo_angle_2" type="file">
    </form>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
